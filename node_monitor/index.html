<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>Node Monitor</h1>

      <div class="row">
        <table>
          <caption>Waiting</caption>
          <thead>
            <th scope="col">Node Type</th>
            <th scope="col">UUID</th>
          </thead>
          <tbody id="Waiting">
            
          </tbody>
        </table>

        <table>
          <caption>Processing</caption>
          <thead>
            <th scope="col">Node Type</th>
            <th scope="col">UUID</th>
          </thead>
          <tbody id="Processing">
            
          </tbody>
        </table>

        <table>
          <caption>Outputting</caption>
          <thead>
            <th scope="col">Node Type</th>
            <th scope="col">UUID</th>
          </thead>
          <tbody id="Outputting">
            
          </tbody>
        </table>
      </div>
      
    </main>
  </body>
</html>
